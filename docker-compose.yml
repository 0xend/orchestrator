services:
  db:
    image: postgres:16-alpine
    container_name: orchestrator-db
    environment:
      POSTGRES_DB: orchestrator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - orchestrator_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orchestrator"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: orchestrator-backend
    depends_on:
      db:
        condition: service_healthy
    working_dir: /workspace/backend
    environment:
      APP_ENV: docker
      DEBUG: "true"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/orchestrator
      REPOS_CONFIG_PATH: /workspace/repos.docker.yaml
      API_AUTH_REQUIRED: "true"
      DEV_BEARER_TOKEN: orchestrator-dev-token
      GIT_AUTHOR_NAME: Orchestrator Bot
      GIT_AUTHOR_EMAIL: orchestrator-bot@example.com
      GH_CLI_BIN: gh
      ORCHESTRATOR_BACKEND_PORT: ${ORCHESTRATOR_BACKEND_PORT:-18000}
      ORCHESTRATOR_FRONTEND_PORT: ${ORCHESTRATOR_FRONTEND_PORT:-13000}
    ports:
      - "${ORCHESTRATOR_BACKEND_PORT:-18000}:8000"
    volumes:
      - .:/workspace

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: orchestrator-frontend
    depends_on:
      - backend
    working_dir: /workspace/frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${ORCHESTRATOR_BACKEND_PORT:-18000}
      NEXT_PUBLIC_DEV_BEARER_TOKEN: orchestrator-dev-token
      NEXT_PUBLIC_DEV_USER: web-user
      BACKEND_URL: http://backend:8000
    command: ["npm", "run", "dev", "--", "--hostname", "0.0.0.0", "--port", "3000"]
    ports:
      - "${ORCHESTRATOR_FRONTEND_PORT:-13000}:3000"
    volumes:
      - .:/workspace
      - frontend_node_modules:/workspace/frontend/node_modules
      - frontend_next_cache:/workspace/frontend/.next

volumes:
  orchestrator_postgres_data:
  frontend_node_modules:
  frontend_next_cache:
